Steeltoe
"Simple, effective, lethal."
Primary-Fire: Shotgun. Fires a spread of 6 pellets, each dealing 9 damage.
Secondary-Fire: Resonance Hammer. Charge up a short-range melee attack that can deflect projectiles and bullets. Deals 30 damage. 
SPECIAL: Firing your shotgun right as Resonance Hammer is unleashed activates a Naildriver, massively reducing spread.  Missing the window instead results in a Scattershot, increasing spread instead.  All boosted pellets deal 1.7X damage, and move faster.
Overview: Steeltoes are simple to use hosts that can deal consistent damage at range.  Naildrivers and Scattershots offset the otherwise low damage of the shotgun, and can be used to set up powerful Trickshots.  Aditionally, out of all of the bots that can reflect projectiles, Steeltoes have some of the best reflecting capability.  Resonance-Hammered Router grenades deal great impact damage, as do enemy Steeltoe bullets.  Their main weaknesses are their severe lack of splash damage, and their relative frailty, not having the physical bulk of Deadlifts or the movement speed and I-Frames of Routers.
Best Upgrades:
    Induction Barrel - Sets your pellets on fire, converting them into piercing flames!
     For a measly -10% damage penalty, your bullets become piercing fire blasts.  This can often boost your DPS to up to 2.5x your previous baseline, depending on how many enemies you're peircing through.  It also helps in fighting Colliders, whose shields you now can blast through with high-speed shots.  Only major downside is a worse Aphid matchup, since you'll overheat them instead of dealing direct damage.  
    Stacked Shells - Gain an extra barrel (or three), and unload all of them at once!
     This upgrade initially seems somewhat uninteresting.  It offers you no concrete DPS increase, only shifting your damage into a more bursty form.  You can choose to fire regularly, but then you'd be better off taking a different upgrade.  However, where Stacked Shells really shines is due to one simple fact: When you first swap into a Steeltoe, you automatically load ALL of your shells, instantly.  Combine this with the Function Amplifier Hyperparameter, and you can unleash incredibly strong blasts of burst damage immediately after swapping into a Steeltoe.  Also, because this deals damage through volume of fire, it can wipe entire rooms when combined with Ricochet Shells
    Ricochet Shells - Bullets bounce off walls.  What kind of idiot thinks bullets don't bounce off walls?
     The main benefits of this upgrade are indirect consequences of it.  First, of course, is the fact that it can help to boost damage and consistency.  Hitting shots you'd otherwise miss thanks to wall-bounces is undeniably great, and with Induction Barrel you can hit the same enemy twice with one pellet. The other main benefit is the 1.5x innate style multiplier from the Rebound Trickshot.  By landing Rebounds, you can easily take your regular Steeltoe Trickshots from 2X to 3X, or 3X to 4.5X.  Plus, it feels stylish as hell!
Trivia:  
Steeltoes clearly draw design inspiration from V1 from Ultrakill, especially in regards to their projectile boosting deflect, and their triangular heads.
The design for Steeltoes in pre-release RAM was different, being bulkier and having a badass cloak.  I've personally christened these early Steeltoes "Irongreaves", but that is just my silly fanon name.
They're arguably the most prominent RAM bot, being featured on the game's box art as well as having one of the more in-depth and complicated questlines.  So much for "RAM is the roguelike with no main character", huh?
That being said, out of every RAM bot, they've gotten the least attention from Xylem Studios during their devlogs.  So maybe they aren't the favorite of Toby and Andrew after all...

Router
Primary-Fire: Grenade Throw.  Throw a pipe bomb that deals high (up to 85) impact damage with a long stun duration, before exploding shortly afterwards (30 damage).  Heavily affected by momentum, and gains damage with speed.
Secondary-Fire: Drift. Charge up a fast dash with I-Frames.  Leave behind a flash of burning rubber that can deal damage and deflect shots.
SPECIAL: Tokyo Drifting - Fast, slippery movement.  
Overview: 
Ah, the simple Router.  Ever since 1992, humanity has dedicated huge R&D budgets to figuring out the most optimal weapons to be thrown elegantly from a wheeled vehicle.  Many of our greatest developments, from the humble Red Koopa Shell to the fearesome Warthog of the UNSC, are simply extentions of the inherent human need to combine lethality and mobility into one package.  Routers represent the pinnacle of almost a half century of vehicular-weapon evolution, throwing compact and lethal orange rectangles packed full of homebrewed ANFO.  They're also evasive hosts, with an invincible dash that can pass through hazards or escape from foes.  N
Best Upgrades: 
    Shaped Charges
     Shaped Charges can be hard to get used to.  Router grenades are difficult to aim at times, and Shaped Charges pretty much mandates that you "git gud" at aiming since it removes all of your splash damage capability.  However, once you overcome the hurdle of aiming, you will find Shaped Charges to be a monstrously strong upgrade that's capable of clearing entire rooms singlehandedly.  Additionally, because of the Skewered Trickshot, you'll be able to milk out a lot more style than you otherwise would with a splash-damage-oriented Router build.  Then, when you add on Spin Control for auto-aim, you get one of the strongest RAM bots possible, giving Aphid and Thistle runs for their money.  
    Self-Preservation Override
     The description of this upgrade is simply; "Become the brick", which is a good way to describe SPO.  This upgrade gives you extreme damage potential, at the cost of your health.  Slamming into enemies can deal comparable damage to unboosted grenade impacts, but it will also whittle away at your health pool.  However, given the nature of RAM, losing health isn't as big of a downside as it is in other roguelikes, so if you're confident in your swapping, just drive into enemies and hit them with a little Bergen-style trucking.
    Predictive Suspension
     Yeah, a common upgrade.  But in this case, its one of the stronger ones.  Predictive suspension, even just a single stack, gives you much better control over Router's movement, and lets you more consistently dodge shots and aim your own.  Compared to other movement speed upgrades, Router uniquely benefits a lot more due to its very slippery movement, and the ability to easily make U-turns or change direction to re-target gives you value on par with some other bots purple or gold tier upgrades.  If the other upgrades on offer don't appeal to you, Predictive Suspension is never a bad pick for getting more value out of your mail-delivery buddies.  
Trivia:
In earlier versions, they had a burst-fire rifle, and didn't get damage from speed.  The poor unfortunate Wheelbot was a tragic being, left behind by history to rot in irrelevance and devlogs.

Accellerator in Stage 3 will make you hate these guys.  If you know, you know...
Routers have the lowest health out of every bot in RAM.
